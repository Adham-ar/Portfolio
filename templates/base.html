<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adham | Backend Engineer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Transparent Blurry Sticky Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-nav py-3">
        <div class="container">
            <a class="navbar-brand fw-bold mono-font" href="{{ url_for('home') }}">
                <span class="text-white-50">&lt;</span>Adham<span style="color: var(--accent-teal)">.dev</span><span class="text-white-50">&gt;</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-3 align-items-center">
                    <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('home') }}">Home</a></li>
                    <li class="nav-item"><a class="nav-link text-white-50" href="#projects">Projects</a></li>
                    {% if current_user.is_authenticated %}
                        <li class="nav-item"><a class="btn btn-sm btn-outline-warning px-3" href="{{ url_for('admin_dashboard') }}">Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link text-white-50" href="{{ url_for('logout') }}">Logout</a></li>
                    {% else %}
                        <li class="nav-item"><a class="nav-link text-white-50" href="{{ url_for('login') }}">Login</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <!-- Spacing Buffer for Fixed Top Nav -->
    <div style="margin-top: 80px;"></div>

    <main class="flex-grow-1">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="text-center py-5 mt-5" style="border-top: 1px solid var(--border-color); background-color: #080c14;">
        <div class="container">
            <p class="mb-2 text-muted small mono-font">&copy; 2026 // Engineered with Flask & SQLAlchemy</p>
            <div class="d-flex justify-content-center gap-4 mt-3">
                <a href="#" class="text-white-50 hover-teal"><i class="fab fa-github fa-xl"></i></a>
                <a href="#" class="text-white-50 hover-teal"><i class="fab fa-linkedin fa-xl"></i></a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
