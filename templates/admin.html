<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-white text-[#111111]">

    <nav class="border-b border-[#eeeeee]">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <a href="{{ url_for('home') }}" class="text-xl font-bold tracking-tighter">Home</a>
                <span class="text-[#eeeeee]">/</span>
                <span class="text-sm font-medium">Dashboard</span>
            </div>
            <a href="{{ url_for('logout') }}" class="text-xs font-medium text-red-500 hover:text-red-600 transition-colors">Logout</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="flex items-center justify-between mb-12">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Projects</h1>
                <p class="text-[#666666] font-light mt-1">Manage your professional portfolio items.</p>
            </div>
            <a href="{{ url_for('new_project') }}" class="bg-[#111111] text-white text-sm font-medium px-6 py-3 rounded-full hover:bg-black transition-all">
                + Add Project
            </a>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b border-[#eeeeee] text-xs font-semibold uppercase tracking-widest text-[#999999]">
                        <th class="pb-4 font-medium">Title</th>
                        <th class="pb-4 font-medium">Tech Stack</th>
                        <th class="pb-4 font-medium">Date</th>
                        <th class="pb-4 font-medium text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-[#f5f5f5]">
                    {% for project in projects %}
                    <tr class="group">
                        <td class="py-6 font-medium text-sm">{{ project.title }}</td>
                        <td class="py-6">
                            <span class="text-xs text-[#666666] font-light">{{ project.tech_stack }}</span>
                        </td>
                        <td class="py-6 text-xs text-[#999999]">{{ project.date_created.strftime('%b %d, %Y') }}</td>
                        <td class="py-6 text-right space-x-4">
                            <a href="{{ url_for('edit_project', project_id=project.id) }}" class="text-xs font-medium text-blue-500 hover:underline">Edit</a>
                            <form action="{{ url_for('delete_project', project_id=project.id) }}" method="POST" class="inline">
                                <button type="submit" class="text-xs font-medium text-red-400 hover:text-red-600 transition-colors" onclick="return confirm('Delete this project?')">Delete</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </main>

</body>
</html>
